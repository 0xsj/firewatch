# Firewatch — Honeypot Server Configuration
# Copy this file and adjust settings for your deployment.

server:
  # Domain the honeypot will appear to serve. Used in TLS certs
  # and response headers to look authentic.
  domain: "localhost"
  port: 8080

  tls:
    enabled: false
    # cert: "/etc/firewatch/tls/cert.pem"
    # key:  "/etc/firewatch/tls/key.pem"

# ---------------------------------------------------------------------------
# IP Filtering
# Block known-bad IPs and skip processing for known-good IPs.
# Supports individual IPs and CIDR ranges. Allowlist takes precedence.
# ---------------------------------------------------------------------------
ip_filter:
  # Inline lists:
  # allowlist:
  #   - "10.0.0.0/8"        # Internal network
  #   - "192.168.1.100"     # Monitoring server
  # blocklist:
  #   - "203.0.113.0/24"    # Known bad range
  #   - "198.51.100.50"     # Known scanner

  # File-based lists (one IP/CIDR per line, # comments):
  # allowlist_file: "/etc/firewatch/allowlist.txt"
  # blocklist_file: "/etc/firewatch/blocklist.txt"

# ---------------------------------------------------------------------------
# Rate Limiting
# Per-IP rate limiting to detect and slow down scanners.
# Enforces token bucket algorithm: sustained rate + burst allowance.
# ---------------------------------------------------------------------------
rate_limit:
  enabled: true
  requests_per_second: 10  # Sustained rate (10 req/sec = 600/min)
  burst: 20                # Burst allowance (allows temporary spikes)
  cleanup_minutes: 5       # Clean up stale limiters every N minutes

# ---------------------------------------------------------------------------
# Honeypot Modules
# Enable only the modules relevant to your threat model. Each module
# emulates a different attack surface and captures different attacker
# behaviors. All modules are disabled by default.
# ---------------------------------------------------------------------------
modules:
  nextjs:
    enabled: true
    endpoints:
      - "/"
      - "/_next/server/pages"
      - "/_rsc"

  wordpress:
    enabled: true
    fake_version: "6.4.2"

  exposure:
    enabled: true
    # Content returned when attackers request .env, .git/config, etc.
    fake_env: |
      DB_HOST=localhost
      DB_USER=root
      DB_PASS=changeme
      SECRET_KEY=fake_secret_key_do_not_use

  api:
    enabled: true

  cloud:
    enabled: true

  admin:
    enabled: false

  cve:
    enabled: false
    # Filter to specific CVEs (empty = all enabled):
    # cves:
    #   - "CVE-2021-44228"   # Log4Shell
    #   - "CVE-2022-22965"   # Spring4Shell
    #   - "CVE-2023-34362"   # MOVEit Transfer
    #   - "CVE-2024-3400"    # PAN-OS GlobalProtect
    #   - "CVE-2017-5638"    # Apache Struts2
    #   - "CVE-2023-22515"   # Confluence

# ---------------------------------------------------------------------------
# Fingerprinting
# JA3/JA4 require TLS to be enabled. GeoIP requires a MaxMind database.
# ---------------------------------------------------------------------------
fingerprinting:
  ja3: true
  ja4: true
  geoip: false
  # geoip_db: "/path/to/GeoLite2-City.mmdb"
  reverse_dns: false

# ---------------------------------------------------------------------------
# Detection
# Custom signatures extend the built-in detection engine.
# Same-ID signatures override built-in ones.
# ---------------------------------------------------------------------------
detection:
  # signatures_file: "/etc/firewatch/custom-signatures.yaml"
  # signatures_dir: "/etc/firewatch/signatures.d/"

  # Campaign auto-correlation — background detection of coordinated attacks
  campaign:
    enabled: false
    window_minutes: 30    # Look-back window for correlation
    tick_seconds: 60      # How often to run correlation

  # Behavioral fingerprinting — per-IP temporal pattern analysis
  behavior:
    enabled: false
    window_minutes: 5       # Analysis window
    sweep_threshold: 20     # Unique paths to trigger scan sweep
    brute_threshold: 10     # Same-path hits to trigger brute force
    module_threshold: 3     # Unique modules to trigger module hopping
    cleanup_minutes: 2      # Clean up stale histories

# ---------------------------------------------------------------------------
# Alerts
# Configure one or more channels. Only events at or above min_severity
# will be dispatched. Severity levels: critical, high, medium, low, info
# ---------------------------------------------------------------------------
alerts:
  slack:
    # webhook_url: "https://hooks.slack.com/services/T00/B00/xxx"
    min_severity: "medium"

  discord:
    # webhook_url: "https://discord.com/api/webhooks/000/xxx"
    min_severity: "medium"

  webhook:
    # url: "https://your-siem.example.com/api/ingest"
    # headers:
    #   Authorization: "Bearer token"
    min_severity: "medium"

# ---------------------------------------------------------------------------
# Storage
# ---------------------------------------------------------------------------
storage:
  type: "sqlite"
  path: "./firewatch.db"

# ---------------------------------------------------------------------------
# Deception
# Extra techniques to make the honeypot more convincing and to plant
# trackable breadcrumbs in attacker tooling.
# ---------------------------------------------------------------------------
deception:
  honey_tokens: true
  breadcrumbs: true
  fake_errors: true

# ---------------------------------------------------------------------------
# Logging
# level: debug | info | warn | error
# format: json | text
# ---------------------------------------------------------------------------
logging:
  level: "info"
  format: "json"
