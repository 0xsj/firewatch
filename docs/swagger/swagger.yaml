host: localhost:8080
info:
  contact:
    email: support@example.com
    name: API Support
  description: Multi-tenant API built with hexagonal architecture. Provides identity
    management, tenant management, email templates, and more.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  title: Hexagonal Go API
  version: "1.0"
paths:
  /api/v1/assignments:
    post:
      consumes:
      - application/json
      description: Assigns a role to a user within a tenant
      parameters:
      - description: Role assignment request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_permissions_interface_http_v1.AssignRoleRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Role assigned successfully
          schema:
            $ref: '#/definitions/github_com_0xsj_hexagonal-go_internal_permissions_application_dto.AssignmentDTO'
        "400":
          description: Invalid request
          schema:
            $ref: '#/definitions/internal_permissions_interface_http_v1.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_permissions_interface_http_v1.ErrorResponse'
        "404":
          description: Role not found
          schema:
            $ref: '#/definitions/internal_permissions_interface_http_v1.ErrorResponse'
        "409":
          description: Assignment already exists
          schema:
            $ref: '#/definitions/internal_permissions_interface_http_v1.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Assign role to user
      tags:
      - permissions
  /api/v1/assignments/revoke:
    post:
      consumes:
      - application/json
      description: Revokes a role assignment from a user
      parameters:
      - description: Role revocation request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_permissions_interface_http_v1.RevokeRoleRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Role revoked successfully
          schema:
            $ref: '#/definitions/internal_permissions_interface_http_v1.MessageResponse'
        "400":
          description: Invalid request
          schema:
            $ref: '#/definitions/internal_permissions_interface_http_v1.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_permissions_interface_http_v1.ErrorResponse'
        "404":
          description: Assignment not found
          schema:
            $ref: '#/definitions/internal_permissions_interface_http_v1.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Revoke role from user
      tags:
      - permissions
  /api/v1/audit/actors/{userID}:
    get:
      description: Retrieves all audit entries performed by a specific user
      parameters:
      - description: User ID
        in: path
        name: userID
        required: true
        type: string
      - description: Filter by tenant ID
        in: query
        name: tenant_id
        type: string
      - description: Filter by event type
        in: query
        name: event_type
        type: string
      - description: Filter by source domain
        in: query
        name: source
        type: string
      - description: Filter from timestamp (RFC3339)
        in: query
        name: from
        type: string
      - description: Filter to timestamp (RFC3339)
        in: query
        name: to
        type: string
      - description: Page size (default 50, max 100)
        in: query
        name: limit
        type: integer
      - description: Page offset (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Actor activity
          schema:
            $ref: '#/definitions/github_com_0xsj_hexagonal-go_internal_audit_application_dto.GetActorActivityResponse'
        "400":
          description: Invalid parameters
          schema:
            $ref: '#/definitions/internal_audit_interface_http_v1.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_audit_interface_http_v1.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get actor activity
      tags:
      - audit
  /api/v1/audit/entries:
    get:
      description: Retrieves audit entries with optional filtering and pagination
      parameters:
      - description: Filter by tenant ID
        in: query
        name: tenant_id
        type: string
      - description: Filter by user ID (actor)
        in: query
        name: user_id
        type: string
      - description: Filter by event type
        in: query
        name: event_type
        type: string
      - description: Filter by source domain
        in: query
        name: source
        type: string
      - description: Filter by correlation ID
        in: query
        name: correlation_id
        type: string
      - description: Filter from timestamp (RFC3339)
        in: query
        name: from
        type: string
      - description: Filter to timestamp (RFC3339)
        in: query
        name: to
        type: string
      - description: Page size (default 50, max 100)
        in: query
        name: limit
        type: integer
      - description: Page offset (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: List of audit entries
          schema:
            $ref: '#/definitions/github_com_0xsj_hexagonal-go_internal_audit_application_dto.ListEntriesResponse'
        "400":
          description: Invalid query parameters
          schema:
            $ref: '#/definitions/internal_audit_interface_http_v1.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_audit_interface_http_v1.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List audit entries
      tags:
      - audit
  /api/v1/audit/entries/{id}:
    get:
      description: Retrieves a single audit entry by its ID
      parameters:
      - description: Audit entry ID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Audit entry found
          schema:
            $ref: '#/definitions/github_com_0xsj_hexagonal-go_internal_audit_application_dto.GetEntryResponse'
        "400":
          description: Invalid entry ID
          schema:
            $ref: '#/definitions/internal_audit_interface_http_v1.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_audit_interface_http_v1.ErrorResponse'
        "404":
          description: Entry not found
          schema:
            $ref: '#/definitions/internal_audit_interface_http_v1.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get audit entry
      tags:
      - audit
  /api/v1/audit/health:
    get:
      description: Returns OK if the audit service is healthy
      produces:
      - application/json
      responses:
        "200":
          description: Service is healthy
          schema:
            $ref: '#/definitions/internal_audit_interface_http_v1.MessageResponse'
      summary: Audit health check
      tags:
      - audit
  /api/v1/audit/resources/{type}/{id}:
    get:
      description: Retrieves all audit entries for a specific resource
      parameters:
      - description: Resource type (e.g., user, tenant, flag)
        in: path
        name: type
        required: true
        type: string
      - description: Resource ID
        in: path
        name: id
        required: true
        type: string
      - description: Filter by tenant ID
        in: query
        name: tenant_id
        type: string
      - description: Filter from timestamp (RFC3339)
        in: query
        name: from
        type: string
      - description: Filter to timestamp (RFC3339)
        in: query
        name: to
        type: string
      - description: Page size (default 50, max 100)
        in: query
        name: limit
        type: integer
      - description: Page offset (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Resource audit trail
          schema:
            $ref: '#/definitions/github_com_0xsj_hexagonal-go_internal_audit_application_dto.GetResourceTrailResponse'
        "400":
          description: Invalid parameters
          schema:
            $ref: '#/definitions/internal_audit_interface_http_v1.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_audit_interface_http_v1.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get resource audit trail
      tags:
      - audit
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user with email and password, returns JWT tokens
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_0xsj_hexagonal-go_internal_identity_application_dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Login successful with tokens
          schema:
            $ref: '#/definitions/github_com_0xsj_hexagonal-go_internal_identity_application_dto.LoginResponse'
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/internal_identity_interface_http_v1.ErrorResponse'
        "401":
          description: Invalid credentials
          schema:
            $ref: '#/definitions/internal_identity_interface_http_v1.ErrorResponse'
        "403":
          description: Account suspended or email not verified
          schema:
            $ref: '#/definitions/internal_identity_interface_http_v1.ErrorResponse'
        "429":
          description: Too many login attempts
          schema:
            $ref: '#/definitions/internal_identity_interface_http_v1.ErrorResponse'
      summary: User login
      tags:
      - identity
  /api/v1/auth/logout:
    post:
      description: Invalidates the current session and access token
      produces:
      - application/json
      responses:
        "200":
          description: Logged out successfully
          schema:
            $ref: '#/definitions/github_com_0xsj_hexagonal-go_internal_identity_application_dto.MessageResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_identity_interface_http_v1.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/internal_identity_interface_http_v1.ErrorResponse'
      security:
      - BearerAuth: []
      summary: User logout
      tags:
      - identity
  /api/v1/auth/oauth:
    get:
      description: Redirects to the OAuth provider's authorization page. After authorization,
        the provider will redirect back to the callback endpoint.
      parameters:
      - description: OAuth provider name
        enum:
        - google
        - github
        in: query
        name: provider
        required: true
        type: string
      - description: Tenant ID for new user registration
        format: uuid
        in: query
        name: tenant_id
        type: string
      responses:
        "307":
          description: Redirect to OAuth provider
        "400":
          description: Provider is required or unsupported
          schema:
            $ref: '#/definitions/internal_identity_interface_http_v1.ErrorResponse'
        "500":
          description: Failed to initiate OAuth
          schema:
            $ref: '#/definitions/internal_identity_interface_http_v1.ErrorResponse'
      summary: Initiate OAuth flow
      tags:
      - identity
  /api/v1/auth/oauth/callback:
    get:
      description: Handles the callback from the OAuth provider after user authorization.
        Exchanges the authorization code for tokens and logs the user in.
      parameters:
      - description: OAuth provider name
        enum:
        - google
        - github
        in: query
        name: provider
        required: true
        type: string
      - description: Authorization code from OAuth provider
        in: query
        name: code
        required: true
        type: string
      - description: State token for CSRF validation
        in: query
        name: state
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Login successful with tokens
          schema:
            $ref: '#/definitions/github_com_0xsj_hexagonal-go_internal_identity_application_dto.LoginResponse'
        "400":
          description: Invalid state, missing code, or unsupported provider
          schema:
            $ref: '#/definitions/internal_identity_interface_http_v1.ErrorResponse'
        "401":
          description: OAuth authentication failed
          schema:
            $ref: '#/definitions/internal_identity_interface_http_v1.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/internal_identity_interface_http_v1.ErrorResponse'
      summary: OAuth callback
      tags:
      - identity
  /api/v1/auth/password/forgot:
    post:
      consumes:
      - application/json
      description: Sends a password reset email to the specified address if it exists
      parameters:
      - description: Password reset request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_0xsj_hexagonal-go_internal_identity_application_dto.RequestPasswordResetRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Reset email sent (if account exists)
          schema:
            $ref: '#/definitions/github_com_0xsj_hexagonal-go_internal_identity_application_dto.MessageResponse'
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/internal_identity_interface_http_v1.ErrorResponse'
      summary: Request password reset
      tags:
      - identity
  /api/v1/auth/password/reset:
    post:
      consumes:
      - application/json
      description: Resets the user's password using a valid reset token
      parameters:
      - description: New password with reset token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_0xsj_hexagonal-go_internal_identity_application_dto.ResetPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Password reset successfully
          schema:
            $ref: '#/definitions/github_com_0xsj_hexagonal-go_internal_identity_application_dto.MessageResponse'
        "400":
          description: Invalid request body or weak password
          schema:
            $ref: '#/definitions/internal_identity_interface_http_v1.ErrorResponse'
        "404":
          description: Token not found or expired
          schema:
            $ref: '#/definitions/internal_identity_interface_http_v1.ErrorResponse'
      summary: Reset password
      tags:
      - identity
  /api/v1/auth/refresh:
    post:
      consumes:
      - application/json
      description: Exchanges a valid refresh token for a new access token
      parameters:
      - description: Refresh token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_0xsj_hexagonal-go_internal_identity_application_dto.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: New tokens issued
          schema:
            $ref: '#/definitions/github_com_0xsj_hexagonal-go_internal_identity_application_dto.LoginResponse'
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/internal_identity_interface_http_v1.ErrorResponse'
        "401":
          description: Invalid or expired refresh token
          schema:
            $ref: '#/definitions/internal_identity_interface_http_v1.ErrorResponse'
      summary: Refresh access token
      tags:
      - identity
  /api/v1/email/templates:
    get:
      description: Retrieves a paginated list of email templates with optional filters
      parameters:
      - description: Filter by tenant ID
        format: uuid
        in: query
        name: tenant_id
        type: string
      - description: Filter by status
        enum:
        - draft
        - active
        - archived
        - deleted
        in: query
        name: status
        type: string
      - description: Filter by locale
        example: en
        in: query
        name: locale
        type: string
      - description: Filter by slug containing text
        in: query
        name: slug_contains
        type: string
      - description: Filter by name containing text
        in: query
        name: name_contains
        type: string
      - default: true
        description: Include system templates
        in: query
        name: include_system
        type: boolean
      - default: 0
        description: Pagination offset
        in: query
        minimum: 0
        name: offset
        type: integer
      - default: 20
        description: Pagination limit
        in: query
        maximum: 100
        minimum: 1
        name: limit
        type: integer
      - description: Sort field
        enum:
        - created_at
        - updated_at
        - name
        - slug
        in: query
        name: sort_by
        type: string
      - default: desc
        description: Sort order
        enum:
        - asc
        - desc
        in: query
        name: sort_order
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: List of templates
          schema:
            $ref: '#/definitions/github_com_0xsj_hexagonal-go_internal_email_application_dto.ListTemplatesResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_email_interface_http_v1.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List email templates
      tags:
      - email
    post:
      consumes:
      - application/json
      description: Creates a new email template with subject, body, and variable definitions
      parameters:
      - description: Create template request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_0xsj_hexagonal-go_internal_email_application_dto.CreateTemplateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Template created successfully
          schema:
            $ref: '#/definitions/github_com_0xsj_hexagonal-go_internal_email_application_dto.CreateTemplateResponse'
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/internal_email_interface_http_v1.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_email_interface_http_v1.ErrorResponse'
        "409":
          description: Template with slug already exists
          schema:
            $ref: '#/definitions/internal_email_interface_http_v1.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create email template
      tags:
      - email
  /api/v1/email/templates/{id}:
    delete:
      description: Soft-deletes an email template
      parameters:
      - description: Template ID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Template deleted successfully
          schema:
            $ref: '#/definitions/github_com_0xsj_hexagonal-go_internal_email_application_dto.DeleteTemplateResponse'
        "400":
          description: Invalid template ID
          schema:
            $ref: '#/definitions/internal_email_interface_http_v1.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_email_interface_http_v1.ErrorResponse'
        "404":
          description: Template not found
          schema:
            $ref: '#/definitions/internal_email_interface_http_v1.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete email template
      tags:
      - email
    get:
      description: Retrieves an email template by its unique identifier
      parameters:
      - description: Template ID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Template found
          schema:
            $ref: '#/definitions/github_com_0xsj_hexagonal-go_internal_email_application_dto.GetTemplateResponse'
        "400":
          description: Invalid template ID
          schema:
            $ref: '#/definitions/internal_email_interface_http_v1.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_email_interface_http_v1.ErrorResponse'
        "404":
          description: Template not found
          schema:
            $ref: '#/definitions/internal_email_interface_http_v1.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get email template by ID
      tags:
      - email
    put:
      consumes:
      - application/json
      description: Updates an existing email template
      parameters:
      - description: Template ID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      - description: Update template request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_0xsj_hexagonal-go_internal_email_application_dto.UpdateTemplateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Template updated successfully
          schema:
            $ref: '#/definitions/github_com_0xsj_hexagonal-go_internal_email_application_dto.UpdateTemplateResponse'
        "400":
          description: Invalid request body or template ID
          schema:
            $ref: '#/definitions/internal_email_interface_http_v1.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_email_interface_http_v1.ErrorResponse'
        "404":
          description: Template not found
          schema:
            $ref: '#/definitions/internal_email_interface_http_v1.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update email template
      tags:
      - email
  /api/v1/email/templates/{id}/activate:
    post:
      description: Activates a draft or archived template, making it available for
        use
      parameters:
      - description: Template ID
        format: uuid
