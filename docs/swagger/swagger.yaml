    type: object
  github_com_0xsj_hexagonal-go_internal_email_application_dto.UpdateTemplateResponse:
    properties:
      template:
        $ref: '#/definitions/github_com_0xsj_hexagonal-go_internal_email_application_dto.TemplateDTO'
