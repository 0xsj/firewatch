        type: string
      slug:
        type: string
      status:
        type: string
      subject:
        type: string
      tenant_id:
        type: string
      updated_at:
        type: string
      updated_by:
        type: string
      variables:
        items:
          $ref: '#/definitions/github_com_0xsj_hexagonal-go_internal_email_application_dto.VariableDTO'
