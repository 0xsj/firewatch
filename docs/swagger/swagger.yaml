      id:
        type: string
      ip_address:
        type: string
      last_active_at:
        type: string
      provider:
        type: string
      revoked_at:
        type: string
      status:
        type: string
      tenant_id:
        type: string
      user_agent:
        type: string
      user_id:
        type: string
    type: object
  github_com_0xsj_hexagonal-go_internal_identity_application_dto.SuspendUserRequest:
    properties:
      reason:
        type: string
