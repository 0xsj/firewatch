  github_com_0xsj_hexagonal-go_internal_identity_application_dto.UserSummaryDTO:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      role:
        type: string
      status:
        type: string
    type: object
  github_com_0xsj_hexagonal-go_internal_identity_application_dto.VerifyEmailRequest:
    properties:
      token:
        type: string
    required:
    - token
    type: object
  internal_email_interface_http_v1.ErrorResponse:
    description: Error response returned by the API
    properties:
      code:
        example: TEMPLATE_NOT_FOUND
        type: string
      message:
        example: template not found
        type: string
      meta:
        additionalProperties: {}
        type: object
    type: object
  internal_identity_interface_http_v1.ErrorResponse:
    description: Error response returned by the API
    properties:
      code:
        example: USER_NOT_FOUND
        type: string
      message:
        example: user not found
        type: string
      meta:
        additionalProperties: {}
        type: object
    type: object
  internal_identity_interface_http_v1.SessionsResponse:
    description: List of user sessions
    properties:
      sessions:
        items:
          $ref: '#/definitions/github_com_0xsj_hexagonal-go_internal_identity_application_dto.SessionDTO'
        type: array
    type: object
  internal_tenant_interface_http_v1.ErrorResponse:
    description: Error response returned by the API
    properties:
      code:
        example: TENANT_NOT_FOUND
        type: string
      message:
        example: tenant not found
        type: string
      meta:
        additionalProperties: {}
        type: object
    type: object
host: localhost:8080
info:
  contact:
    email: support@example.com
    name: API Support
  description: Multi-tenant API built with hexagonal architecture. Provides identity
    management, tenant management, email templates, and more.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  title: Hexagonal Go API
  version: "1.0"
paths:
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user with email and password, returns JWT tokens
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_0xsj_hexagonal-go_internal_identity_application_dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Login successful with tokens
          schema:
            $ref: '#/definitions/github_com_0xsj_hexagonal-go_internal_identity_application_dto.LoginResponse'
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/internal_identity_interface_http_v1.ErrorResponse'
        "401":
          description: Invalid credentials
          schema:
            $ref: '#/definitions/internal_identity_interface_http_v1.ErrorResponse'
        "403":
          description: Account suspended or email not verified
          schema:
            $ref: '#/definitions/internal_identity_interface_http_v1.ErrorResponse'
        "429":
          description: Too many login attempts
          schema:
            $ref: '#/definitions/internal_identity_interface_http_v1.ErrorResponse'
      summary: User login
      tags:
      - identity
  /api/v1/auth/logout:
    post:
      description: Invalidates the current session and access token
      produces:
      - application/json
      responses:
        "200":
          description: Logged out successfully
          schema:
            $ref: '#/definitions/github_com_0xsj_hexagonal-go_internal_identity_application_dto.MessageResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_identity_interface_http_v1.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/internal_identity_interface_http_v1.ErrorResponse'
      security:
      - BearerAuth: []
      summary: User logout
      tags:
      - identity
  /api/v1/auth/oauth:
    get:
      description: Redirects to the OAuth provider's authorization page. After authorization,
        the provider will redirect back to the callback endpoint.
      parameters:
      - description: OAuth provider name
        enum:
        - google
        - github
        in: query
        name: provider
        required: true
        type: string
      - description: Tenant ID for new user registration
        format: uuid
        in: query
        name: tenant_id
        type: string
      responses:
        "307":
          description: Redirect to OAuth provider
        "400":
          description: Provider is required or unsupported
          schema:
            $ref: '#/definitions/internal_identity_interface_http_v1.ErrorResponse'
        "500":
          description: Failed to initiate OAuth
          schema:
            $ref: '#/definitions/internal_identity_interface_http_v1.ErrorResponse'
      summary: Initiate OAuth flow
      tags:
      - identity
  /api/v1/auth/oauth/callback:
    get:
      description: Handles the callback from the OAuth provider after user authorization.
        Exchanges the authorization code for tokens and logs the user in.
      parameters:
      - description: OAuth provider name
        enum:
        - google
        - github
        in: query
        name: provider
        required: true
        type: string
      - description: Authorization code from OAuth provider
        in: query
        name: code
        required: true
        type: string
      - description: State token for CSRF validation
        in: query
        name: state
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Login successful with tokens
          schema:
            $ref: '#/definitions/github_com_0xsj_hexagonal-go_internal_identity_application_dto.LoginResponse'
        "400":
          description: Invalid state, missing code, or unsupported provider
          schema:
            $ref: '#/definitions/internal_identity_interface_http_v1.ErrorResponse'
        "401":
          description: OAuth authentication failed
          schema:
            $ref: '#/definitions/internal_identity_interface_http_v1.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/internal_identity_interface_http_v1.ErrorResponse'
      summary: OAuth callback
      tags:
      - identity
  /api/v1/auth/password/forgot:
    post:
      consumes:
      - application/json
      description: Sends a password reset email to the specified address if it exists
      parameters:
      - description: Password reset request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_0xsj_hexagonal-go_internal_identity_application_dto.RequestPasswordResetRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Reset email sent (if account exists)
          schema:
            $ref: '#/definitions/github_com_0xsj_hexagonal-go_internal_identity_application_dto.MessageResponse'
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/internal_identity_interface_http_v1.ErrorResponse'
      summary: Request password reset
      tags:
      - identity
  /api/v1/auth/password/reset:
    post:
      consumes:
      - application/json
      description: Resets the user's password using a valid reset token
      parameters:
      - description: New password with reset token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_0xsj_hexagonal-go_internal_identity_application_dto.ResetPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Password reset successfully
          schema:
            $ref: '#/definitions/github_com_0xsj_hexagonal-go_internal_identity_application_dto.MessageResponse'
        "400":
          description: Invalid request body or weak password
          schema:
            $ref: '#/definitions/internal_identity_interface_http_v1.ErrorResponse'
        "404":
          description: Token not found or expired
          schema:
            $ref: '#/definitions/internal_identity_interface_http_v1.ErrorResponse'
      summary: Reset password
      tags:
      - identity
  /api/v1/auth/refresh:
    post:
      consumes:
      - application/json
      description: Exchanges a valid refresh token for a new access token
      parameters:
      - description: Refresh token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_0xsj_hexagonal-go_internal_identity_application_dto.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: New tokens issued
          schema:
            $ref: '#/definitions/github_com_0xsj_hexagonal-go_internal_identity_application_dto.LoginResponse'
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/internal_identity_interface_http_v1.ErrorResponse'
        "401":
          description: Invalid or expired refresh token
          schema:
            $ref: '#/definitions/internal_identity_interface_http_v1.ErrorResponse'
      summary: Refresh access token
      tags:
      - identity
  /api/v1/email/templates:
    get:
      description: Retrieves a paginated list of email templates with optional filters
      parameters:
      - description: Filter by tenant ID
        format: uuid
        in: query
        name: tenant_id
        type: string
      - description: Filter by status
        enum:
        - draft
        - active
        - archived
        - deleted
        in: query
        name: status
        type: string
      - description: Filter by locale
        example: en
        in: query
        name: locale
        type: string
      - description: Filter by slug containing text
        in: query
        name: slug_contains
        type: string
      - description: Filter by name containing text
        in: query
        name: name_contains
        type: string
      - default: true
        description: Include system templates
        in: query
        name: include_system
        type: boolean
      - default: 0
        description: Pagination offset
        in: query
        minimum: 0
        name: offset
        type: integer
      - default: 20
        description: Pagination limit
        in: query
        maximum: 100
        minimum: 1
        name: limit
        type: integer
      - description: Sort field
        enum:
        - created_at
        - updated_at
        - name
        - slug
        in: query
        name: sort_by
        type: string
      - default: desc
        description: Sort order
        enum:
        - asc
        - desc
        in: query
        name: sort_order
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: List of templates
          schema:
            $ref: '#/definitions/github_com_0xsj_hexagonal-go_internal_email_application_dto.ListTemplatesResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_email_interface_http_v1.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List email templates
      tags:
      - email
    post:
      consumes:
      - application/json
      description: Creates a new email template with subject, body, and variable definitions
      parameters:
      - description: Create template request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_0xsj_hexagonal-go_internal_email_application_dto.CreateTemplateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Template created successfully
          schema:
            $ref: '#/definitions/github_com_0xsj_hexagonal-go_internal_email_application_dto.CreateTemplateResponse'
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/internal_email_interface_http_v1.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_email_interface_http_v1.ErrorResponse'
        "409":
          description: Template with slug already exists
          schema:
            $ref: '#/definitions/internal_email_interface_http_v1.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create email template
      tags:
      - email
  /api/v1/email/templates/{id}:
    delete:
      description: Soft-deletes an email template
      parameters:
      - description: Template ID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Template deleted successfully
          schema:
            $ref: '#/definitions/github_com_0xsj_hexagonal-go_internal_email_application_dto.DeleteTemplateResponse'
        "400":
          description: Invalid template ID
          schema:
            $ref: '#/definitions/internal_email_interface_http_v1.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_email_interface_http_v1.ErrorResponse'
        "404":
          description: Template not found
          schema:
            $ref: '#/definitions/internal_email_interface_http_v1.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete email template
      tags:
      - email
    get:
      description: Retrieves an email template by its unique identifier
      parameters:
      - description: Template ID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Template found
          schema:
            $ref: '#/definitions/github_com_0xsj_hexagonal-go_internal_email_application_dto.GetTemplateResponse'
        "400":
          description: Invalid template ID
          schema:
            $ref: '#/definitions/internal_email_interface_http_v1.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_email_interface_http_v1.ErrorResponse'
        "404":
          description: Template not found
          schema:
            $ref: '#/definitions/internal_email_interface_http_v1.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get email template by ID
      tags:
      - email
    put:
      consumes:
      - application/json
      description: Updates an existing email template
