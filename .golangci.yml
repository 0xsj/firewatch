linters:
  enable:
    - gocritic
    - misspell
    - revive
    - unconvert
    - unparam
    - prealloc

linters-settings:
  errcheck:
    exclude-functions:
      - (net/http.ResponseWriter).Write
      - (*encoding/json.Encoder).Encode
      - (io.Writer).Write

issues:
  exclude-dirs:
    - notes
    - docs
  exclude-rules:
    - path: _test\.go
      linters:
        - unparam
        - prealloc
        - revive
    - path: internal/deception/
      linters:
        - misspell
    - path: cmd/
      linters:
        - gocritic
      text: "exitAfterDefer"
    - linters:
        - revive
      text: "exported: exported .* should have comment"
