name: hexagonal-go

services:
  # ============================================================================
  # Core Infrastructure
  # ============================================================================

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: hexagonal-go-postgres
    restart: unless-stopped
    platform: linux/arm64
    environment:
      POSTGRES_USER: hexagonal
      POSTGRES_PASSWORD: hexagonal_dev_pass
      POSTGRES_DB: hexagonal_identity
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5436:5432" # Changed to avoid conflicts
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - hexagonal-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hexagonal"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: hexagonal-go-redis
    restart: unless-stopped
    platform: linux/arm64
    ports:
      - "6383:6379" # Changed to avoid conflicts
    volumes:
      - redis_data:/data
    networks:
      - hexagonal-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes

  # ============================================================================
  # Observability Stack
  # ============================================================================

  # OpenTelemetry Collector
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.91.0
    container_name: hexagonal-go-otel-collector
    restart: unless-stopped
    platform: linux/arm64
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317" # OTLP gRPC receiver
      - "4318:4318" # OTLP HTTP receiver
      - "8888:8888" # Prometheus metrics exposed by the collector
      - "8889:8889" # Prometheus exporter metrics
    networks:
      - hexagonal-network
    depends_on:
      - jaeger
      - prometheus

  # Jaeger - Distributed Tracing
  jaeger:
    image: jaegertracing/all-in-one:1.53
    container_name: hexagonal-go-jaeger
    restart: unless-stopped
    platform: linux/arm64
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686" # Jaeger UI
      - "14268:14268" # Jaeger collector HTTP
      - "14250:14250" # Jaeger collector gRPC
    networks:
      - hexagonal-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:16686"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Prometheus - Metrics Collection
  prometheus:
    image: prom/prometheus:v2.48.1
    container_name: hexagonal-go-prometheus
    restart: unless-stopped
    platform: linux/arm64
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9092:9090" # Changed to avoid conflicts
    networks:
      - hexagonal-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Grafana - Metrics Visualization
  grafana:
    image: grafana/grafana:10.2.3
    container_name: hexagonal-go-grafana
    restart: unless-stopped
    platform: linux/arm64
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:3002
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "3002:3000" # Changed to avoid conflicts
    networks:
      - hexagonal-network
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
  mailpit:
    image: axllent/mailpit:latest
    container_name: hexagonal-go-mailpit
    restart: unless-stopped
    platform: linux/arm64
    ports:
      - "1027:1025" # SMTP server
      - "8027:8025" # Web UI
    networks:
      - hexagonal-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8025"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  hexagonal-network:
    driver: bridge
