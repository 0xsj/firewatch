global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: "hexagonal-go"
    environment: "development"

scrape_configs:
  # Scrape Prometheus itself
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Scrape OpenTelemetry Collector metrics
  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8888", "otel-collector:8889"]

  # Scrape your Go application metrics
  - job_name: "hexagonal-go-api"
    static_configs:
      - targets: ["host.docker.internal:9090"]
    metrics_path: "/metrics"
